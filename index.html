<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentry Node - Multi-Layer Scanner</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --neon-green: #00ff41; --dark-bg: #0a0a0a; --dim-green: rgba(0, 255, 65, 0.2); }
        body { margin: 0; overflow: hidden; background: var(--dark-bg); font-family: 'Courier New', Courier, monospace; }
        
        /* Tactical UI Overlay */
        #header {
            position: absolute; top: 0; left: 0; width: 100%; height: 45px;
            background: rgba(0, 0, 0, 0.9); border-bottom: 2px solid var(--neon-green);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; box-sizing: border-box; z-index: 1000;
        }
        .status-text { color: var(--neon-green); font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }

        /* Map Container (Leaflet) */
        #map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.4; pointer-events: none; }
        
        /* Three.js Canvas */
        canvas { position: absolute; top: 0; left: 0; z-index: 2; pointer-events: auto; }

        #ui-controls {
            position: absolute; bottom: 30px; left: 20px; z-index: 1001;
            background: rgba(0, 0, 0, 0.85); padding: 20px; 
            border-left: 4px solid var(--neon-green);
        }
        #terminal-log { color: var(--neon-green); font-size: 12px; margin-bottom: 15px; }
        
        .button-group { display: flex; gap: 10px; }
        .btn {
            background: transparent; border: 1px solid var(--neon-green);
            color: var(--neon-green); padding: 10px 18px; cursor: pointer;
            text-transform: uppercase; font-weight: bold; font-size: 11px;
            transition: all 0.2s;
        }
        .btn:hover { background: var(--neon-green); color: black; box-shadow: 0 0 15px var(--neon-green); }
        .btn.active { background: var(--neon-green); color: black; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div id="header">
    <div class="status-text">SYSTEM: <span id="sys-status">STANDBY</span></div>
    <div class="status-text">NODES: <span id="record-count">0</span></div>
</div>

<div id="map"></div>

<div id="ui-controls">
    <div id="terminal-log">> INITIALIZING SENSORS...</div>
    <div class="button-group">
        <button id="start-btn" class="btn">START SCAN</button>
        <button id="stop-btn" class="btn">STOP</button>
        <label class="btn">
            IMPORT CSV
            <input type="file" id="csv-input" accept=".csv" multiple>
        </label>
        <button id="reset-btn" class="btn">RESET</button>
    </div>
</div>

<script>
    let scene, camera, renderer, points = [], polyline;
    let map, isScanning = false;
    
    const log = document.getElementById('terminal-log');
    const statusDisplay = document.getElementById('sys-status');
    const recordCounter = document.getElementById('record-count');

    function init() {
        // --- Leaflet Background ---
        map = L.map('map', { zoomControl: false, attributionControl: false }).setView([26.14, -81.79], 10);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        // --- Three.js Setup ---
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 15);

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const grid = new THREE.GridHelper(40, 40, 0x111111, 0x222222);
        scene.add(grid);

        // --- Listeners ---
        document.getElementById('start-btn').onclick = () => { 
            isScanning = true; statusDisplay.innerText = "ACTIVE"; 
            log.innerText = "> SCANNER ACTIVE. LISTENING FOR DATA...";
        };
        document.getElementById('stop-btn').onclick = () => { 
            isScanning = false; statusDisplay.innerText = "PAUSED"; 
            log.innerText = "> SCANNER HALTED.";
        };
        document.getElementById('reset-btn').onclick = resetData;
        document.getElementById('csv-input').onchange = handleCSV;
        window.addEventListener('mousedown', onManualClick);

        animate();
    }

    function onManualClick(event) {
        if (!isScanning || event.target.tagName === 'BUTTON' || event.target.tagName === 'LABEL') return;
        
        // Projecting mouse to a simple 3D coordinate for manual scanning
        const x = (event.clientX / window.innerWidth) * 2 - 1;
        const y = -(event.clientY / window.innerHeight) * 2 + 1;
        addDataPoint(new THREE.Vector3(x * 10, y * 10, (Math.random() * 2) - 1));
    }

    async function handleCSV(event) {
        const files = Array.from(event.target.files);
        log.innerText = `> READING ${files.length} FILES...`;

        for (const file of files) {
            const text = await file.text();
            const lines = text.split('\n');
            lines.forEach(line => {
                const parts = line.split(',').map(Number);
                if (parts.length >= 3 && !parts.some(isNaN)) {
                    // Map CSV x,y,z to Three.js space
                    addDataPoint(new THREE.Vector3(parts[0], parts[1], parts[2]));
                }
            });
        }
        log.innerText = `> IMPORT COMPLETE. RECORDS SYNCED.`;
    }

    function addDataPoint(vec) {
        const geo = new THREE.SphereGeometry(0.12, 8, 8);
        const mat = new THREE.MeshBasicMaterial({ color: 0x00ff41 });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.copy(vec);
        scene.add(mesh);
        
        points.push(vec);
        recordCounter.innerText = points.length;
        drawPolyline();
    }

    function drawPolyline() {
        if (points.length < 2) return;
        if (polyline) scene.remove(polyline);
        
        const geometry = new THREE.BufferGeometry().setFromPoints(points);
        const material = new THREE.LineBasicMaterial({ color: 0x00ff41, transparent: true, opacity: 0.6 });
        polyline = new THREE.Line(geometry, material);
        scene.add(polyline);
    }

    function resetData() {
        points = [];
        while(scene.children.length > 0){ scene.remove(scene.children[0]); }
        scene.add(new THREE.GridHelper(40, 40, 0x111111, 0x222222));
        recordCounter.innerText = "0";
        log.innerText = "> MEMORY PURGED.";
    }

    function animate() {
        requestAnimationFrame(animate);
        if (isScanning) scene.rotation.y += 0.002;
        renderer.render(scene, camera);
    }

    window.onresize = () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    };

    init();
</script>
</body>
</html>
