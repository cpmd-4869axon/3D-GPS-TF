<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentry Node - 3D Visualizer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.15.0/dist/tf.min.js"></script>
    <style>
        :root { --neon-green: #00ff41; --dark-bg: #0a0a0a; }
        body { margin: 0; overflow: hidden; background: var(--dark-bg); font-family: 'Courier New', Courier, monospace; }
        
        /* Fixed Header Bar from Image */
        #header {
            position: absolute; top: 0; left: 0; width: 100%; height: 40px;
            background: rgba(0, 0, 0, 0.9); border-bottom: 2px solid var(--neon-green);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; box-sizing: border-box; z-index: 10;
        }
        .status-text { color: var(--neon-green); font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Terminal Style UI */
        #ui-controls {
            position: absolute; bottom: 20px; left: 20px; z-index: 10;
            background: rgba(0, 0, 0, 0.8); padding: 15px; border-left: 3px solid var(--neon-green);
        }
        #terminal-log { color: var(--neon-green); font-size: 12px; margin-bottom: 10px; }
        
        /* Button Fixes */
        .btn-import {
            background: transparent; border: 1px solid var(--neon-green);
            color: var(--neon-green); padding: 8px 16px; cursor: pointer;
            transition: 0.3s; text-transform: uppercase; font-weight: bold;
        }
        .btn-import:hover { background: var(--neon-green); color: black; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div id="header">
    <div class="status-text">STATUS: <span id="sys-status">READY</span></div>
    <div class="status-text">RECORDS: <span id="record-count">0</span></div>
</div>

<div id="ui-controls">
    <div id="terminal-log">> INITIALIZING SENSORS...</div>
    <label class="btn-import">
        IMPORT CSV FILES
        <input type="file" id="csv-input" accept=".csv" multiple>
    </label>
</div>

<script>
    let scene, camera, renderer, points = [], line;
    const log = document.getElementById('terminal-log');
    const recordCounter = document.getElementById('record-count');

    function init() {
        scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x0a0a0a, 0.1);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 15);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Grid matching the dark map aesthetic
        const grid = new THREE.GridHelper(40, 40, 0x111111, 0x222222);
        scene.add(grid);

        document.getElementById('csv-input').addEventListener('change', handleFiles);
        animate();
    }

    async function handleFiles(event) {
        const files = Array.from(event.target.files);
        log.innerText = `> PROCESSING ${files.length} BATCHES...`;

        for (const file of files) {
            const text = await file.text();
            const data = parseCSV(text);
            
            if (data.length > 0) {
                // Use TF.js to process coordinate tensors
                const tensor = tf.tensor2d(data, [data.length, 3]);
                const coords = await tensor.array();
                
                coords.forEach(c => addDataPoint(new THREE.Vector3(c[0], c[1], c[2])));
                tensor.dispose();
            }
        }
        log.innerText = `> IMPORT SUCCESSFUL.`;
    }

    function parseCSV(text) {
        return text.split('\n')
            .map(row => row.split(',').map(Number))
            .filter(row => row.length === 3 && !row.some(isNaN));
    }

    function addDataPoint(vec) {
        const geo = new THREE.SphereGeometry(0.08, 6, 6);
        const mat = new THREE.MeshBasicMaterial({ color: 0x00ff41 });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.copy(vec);
        scene.add(mesh);
        
        points.push(vec);
        recordCounter.innerText = points.length;
        updateLine();
    }

    function updateLine() {
        if (points.length < 2) return;
        if (line) scene.remove(line);
        const geometry = new THREE.BufferGeometry().setFromPoints(points);
        line = new THREE.Line(geometry, new THREE.LineBasicMaterial({ color: 0x00ff41, opacity: 0.3, transparent: true }));
        scene.add(line);
    }

    function animate() {
        requestAnimationFrame(animate);
        scene.rotation.y += 0.001; // Slow scan rotation
        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    init();
</script>
</body>
</html>
