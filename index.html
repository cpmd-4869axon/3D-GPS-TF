<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SENTRY_NODE_v8</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <style>
        :root { --neon: #00ff41; --bg: #000; --alert: #ff3e3e; }
        body, html { margin: 0; padding: 0; overflow: hidden; background: var(--bg); font-family: 'Courier New', monospace; color: var(--neon); height: 100%; width: 100%; }
        
        /* THE FIX: Map must have a higher z-index than the grid if you want it visible, 
           OR the Viewport must be transparent. We'll make Viewport transparent. */
        #map { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 1; /* Lowest layer */
            filter: brightness(0.6) contrast(1.2) grayscale(1) invert(1); 
            background: #000;
        }
        
        #viewport { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 2; /* Sits on top of map */
            pointer-events: auto; 
        }

        #stats { position: absolute; top: 0; width: 100%; height: 40px; background: rgba(0,0,0,0.9); border-bottom: 1px solid var(--neon); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; box-sizing: border-box; z-index: 1000; }
        #interface { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.85); border-top: 1px solid var(--neon); padding: 20px; box-sizing: border-box; z-index: 1000; backdrop-filter: blur(5px); }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .btn { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 12px 2px; text-align: center; font-size: 11px; text-transform: uppercase; cursor: pointer; }
        .active-btn { background: var(--neon) !important; color: #000 !important; }
        #log { font-size: 10px; color: var(--neon); margin-bottom: 5px; height: 14px; overflow: hidden; }
    </style>
</head>
<body>

<div id="map"></div>
<div id="viewport"></div>

<div id="stats">
    <div>SYS: <span id="mode">STBY</span></div>
    <div>NODES: <span id="count">0</span></div>
</div>

<div id="interface">
    <div id="log">> INITIALIZING_GEOSPATIAL_CORE...</div>
    <div class="btn-grid">
        <div id="start" class="btn">ACQUIRE</div>
        <div id="stop" class="btn">PLOT</div>
        <div id="toggleMap" class="btn">MAP_OFF</div>
        <label class="btn">IMPORT <input type="file" id="file-in" multiple style="display:none;"></label>
        <div id="save" class="btn">SAVE</div>
        <div id="clear" class="btn" style="border-color:var(--alert)">CLEAR</div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let scene, camera, renderer, controls, origin = null, lMap = null;
    let sessionLog = [], currentTrace = [], watchID = null;

    function init() {
        // 1. THREE.JS SETUP
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 100000);
        camera.position.set(0, 500, 500);

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true }); // alpha: true is KEY
        renderer.setClearColor(0x000000, 0); // Make the 3D background transparent
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('viewport').appendChild(renderer.domElement);

        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        
        // Dark Green Grid
        const grid = new THREE.GridHelper(10000, 50, 0x004400, 0x111111);
        scene.add(grid);

        // 2. LEAFLET SETUP
        lMap = L.map('map', { 
            zoomControl: false, 
            attributionControl: false,
            fadeAnimation: false 
        }).setView([0, 0], 2);
        
        // CartoDB Dark Matter tiles look better for this than OpenStreetMap
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(lMap);

        // 3. UI HANDLERS
        document.getElementById('toggleMap').onclick = (e) => {
            const mapDiv = document.getElementById('map');
            const isOff = mapDiv.style.visibility === 'hidden';
            
            if (isOff || mapDiv.style.visibility === '') {
                mapDiv.style.visibility = 'visible';
                e.target.innerText = "MAP_ON";
                e.target.classList.add('active-btn');
                document.getElementById('log').innerText = "> MAP_OVERLAY_ENABLED";
            } else {
                mapDiv.style.visibility = 'hidden';
                e.target.innerText = "MAP_OFF";
                e.target.classList.remove('active-btn');
                document.getElementById('log').innerText = "> MAP_OVERLAY_DISABLED";
            }
        };

        document.getElementById('start').onclick = () => {
            if (watchID) return;
            document.getElementById('mode').innerText = "REC";
            document.getElementById('log').innerText = "> SEARCHING_FOR_SATELLITES...";
            
            watchID = navigator.geolocation.watchPosition(p => {
                const node = { t: Date.now(), lat: p.coords.latitude, lng: p.coords.longitude, alt: p.coords.altitude || 0, id: "LIVE" };
                currentTrace.push(node);
                document.getElementById('count').innerText = currentTrace.length;
                if (!origin) lockOrigin(node.lat, node.lng);
            }, (err) => {
                document.getElementById('log').innerText = "> ERROR: GPS_DENIED";
            }, { enableHighAccuracy: true });
        };

        document.getElementById('stop').onclick = () => {
            if (!watchID) return;
            navigator.geolocation.clearWatch(watchID);
            watchID = null;
            document.getElementById('mode').innerText = "PLOT";
            if (currentTrace.length > 0) {
                renderTrace(currentTrace, '#00ff41');
                sessionLog = sessionLog.concat(currentTrace);
                currentTrace = [];
            }
        };

        document.getElementById('clear').onclick = () => location.reload();

        animate();
    }

    function lockOrigin(lat, lng) {
        origin = { lat, lng };
        lMap.setView([lat, lng], 16);
        document.getElementById('log').innerText = `> ORIGIN_LOCKED: ${lat.toFixed(4)}, ${lng.toFixed(4)}`;
    }

    function renderTrace(data, color) {
        const points = [];
        const group = new THREE.Group();
        const mat = new THREE.MeshBasicMaterial({ color: color });
        const geo = new THREE.SphereGeometry(2, 8, 8);

        data.forEach(d => {
            const x = (d.lng - origin.lng) * 111320 * Math.cos(origin.lat * Math.PI / 180);
            const z = (origin.lat - d.lat) * 111320;
            points.push(new THREE.Vector3(x, d.alt, z));
            const m = new THREE.Mesh(geo, mat);
            m.position.set(x, d.alt, z);
            group.add(m);
        });

        const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
        const line = new THREE.Line(lineGeo, new THREE.LineBasicMaterial({ color: color }));
        group.add(line);
        scene.add(group);
    }

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }

    window.onload = init;
</script>
</body>
</html>
