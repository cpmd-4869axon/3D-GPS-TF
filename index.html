<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentry Node - 3D GPS Engine</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --neon: #00ff41; --bg: #0a0a0a; }
        body { margin: 0; overflow: hidden; background: var(--bg); font-family: 'Courier New', monospace; }
        
        #header {
            position: absolute; top: 0; left: 0; width: 100%; height: 45px;
            background: rgba(0,0,0,0.9); border-bottom: 2px solid var(--neon);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; box-sizing: border-box; z-index: 2000;
        }
        .status { color: var(--neon); font-size: 14px; text-transform: uppercase; }

        /* Layering: Map (Bottom) -> Three.js (Middle) -> UI (Top) */
        #map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.3; }
        #three-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; pointer-events: none; }

        #ui {
            position: absolute; bottom: 30px; left: 20px; z-index: 1000;
            background: rgba(0,0,0,0.85); padding: 20px; border-left: 4px solid var(--neon);
        }
        #log { color: var(--neon); font-size: 12px; margin-bottom: 15px; }
        
        .btns { display: flex; gap: 10px; }
        .btn {
            background: transparent; border: 1px solid var(--neon);
            color: var(--neon); padding: 10px 15px; cursor: pointer;
            text-transform: uppercase; font-size: 11px;
        }
        .btn:hover { background: var(--neon); color: black; }
        .active { background: var(--neon) !important; color: black !important; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div id="header">
    <div class="status">SYSTEM: <span id="sys-state">OFFLINE</span></div>
    <div class="status">NODES: <span id="count">0</span></div>
</div>

<div id="map"></div>
<canvas id="three-canvas"></canvas>

<div id="ui">
    <div id="log">> AWAITING INI SIGNAL...</div>
    <div class="btns">
        <button id="start" class="btn">ACQUIRE GPS</button>
        <button id="stop" class="btn">STOP & EXPORT</button>
        <label class="btn">IMPORT CSV <input type="file" id="csv-in"></label>
        <button id="reset" class="btn">RESET</button>
    </div>
</div>

<script>
    let scene, camera, renderer, map;
    let dataLog = []; // Stores objects for CSV export
    let threePoints = []; // THREE.Vector3 array
    let mapMarkers = [];
    let polyline3D, polyline2D;
    let watchID = null;
    let origin = null;

    function init() {
        // 1. Leaflet (2D Context)
        map = L.map('map', { zoomControl: false, attributionControl: false }).setView([0, 0], 2);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        polyline2D = L.polyline([], {color: '#00ff41', weight: 2}).addTo(map);

        // 2. Three.js (3D Visualization)
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(0, 50, 100);
        camera.lookAt(0,0,0);

        renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('three-canvas'), antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);

        // Add 3D Grid Hub
        const grid = new THREE.GridHelper(500, 50, 0x00ff41, 0x111111);
        grid.material.opacity = 0.2;
        grid.material.transparent = true;
        scene.add(grid);

        // UI Wire-up
        document.getElementById('start').onclick = startTracking;
        document.getElementById('stop').onclick = stopAndExport;
        document.getElementById('reset').onclick = () => location.reload();
        document.getElementById('csv-in').onchange = handleImport;

        animate();
    }

    function startTracking() {
        if (!navigator.geolocation) return alert("Geo not supported");
        
        document.getElementById('start').classList.add('active');
        document.getElementById('sys-state').innerText = "ACTIVE";
        
        watchID = navigator.geolocation.watchPosition((pos) => {
            captureNode(pos.coords.latitude, pos.coords.longitude, pos.coords.altitude || 0);
        }, (err) => console.error(err), { enableHighAccuracy: true });
    }

    function captureNode(lat, lng, alt) {
        const timestamp = new Date().toISOString();
        
        // Handle initial point to set origin (0,0,0)
        if (!origin) {
            origin = { lat, lng };
            map.setView([lat, lng], 18);
            document.getElementById('log').innerText = `> ORIGIN LOCKED: ${lat}, ${lng}`;
        }

        // Save for CSV
        dataLog.push({ timestamp, lat, lng, alt });

        // Update 2D Map
        const latLng = [lat, lng];
        polyline2D.addLatLng(latLng);
        L.circleMarker(latLng, { radius: 4, color: '#00ff41', fillOpacity: 1 }).addTo(map);

        // Update 3D Visualizer (Real-time)
        // Convert Lat/Lng to local meters relative to your origin
        const x = (lng - origin.lng) * 111320 * Math.cos(lat * Math.PI / 180);
        const z = (origin.lat - lat) * 111320;
        
        const vec = new THREE.Vector3(x, alt, z);
        threePoints.push(vec);

        // Draw node in 3D
        const dotGeo = new THREE.SphereGeometry(1, 8, 8);
        const dotMat = new THREE.MeshBasicMaterial({ color: 0x00ff41 });
        const dot = new THREE.Mesh(dotGeo, dotMat);
        dot.position.copy(vec);
        scene.add(dot);

        update3DPolyline();
        document.getElementById('count').innerText = dataLog.length;
    }

    function update3DPolyline() {
        if (threePoints.length < 2) return;
        if (polyline3D) scene.remove(polyline3D);
        
        const geo = new THREE.BufferGeometry().setFromPoints(threePoints);
        polyline3D = new THREE.Line(geo, new THREE.LineBasicMaterial({ color: 0x00ff41 }));
        scene.add(polyline3D);
        
        // Auto-center camera on latest 3D movement
        camera.lookAt(threePoints[threePoints.length-1]);
    }

    function stopAndExport() {
        if (watchID) navigator.geolocation.clearWatch(watchID);
        document.getElementById('start').classList.remove('active');
        document.getElementById('sys-state').innerText = "PAUSED";
        
        if (dataLog.length === 0) return;

        // Generate CSV
        let csvContent = "data:text/csv;charset=utf-8,Timestamp,Lat,Lng,Alt\n" 
            + dataLog.map(e => `${e.timestamp},${e.lat},${e.lng},${e.alt}`).join("\n");
        
        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `sentry_data_${Date.now()}.csv`);
        document.body.appendChild(link);
        link.click();
        
        document.getElementById('log').innerText = "> SENSOR DISCONNECTED. DATA EXPORTED.";
    }

    async function handleImport(e) {
        const file = e.target.files[0];
        const text = await file.text();
        const rows = text.split('\n').slice(1); // skip header
        rows.forEach(row => {
            const [ts, lat, lng, alt] = row.split(',');
            if (lat && lng) captureNode(parseFloat(lat), parseFloat(lng), parseFloat(alt || 0));
        });
    }

    function animate() {
        requestAnimationFrame(animate);
        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    init();
</script>
</body>
</html>
