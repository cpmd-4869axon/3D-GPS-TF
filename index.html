<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentry Node - 3D Tactical Hub</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --neon-green: #00ff41; --dark-bg: #0a0a0a; }
        body { margin: 0; overflow: hidden; background: var(--dark-bg); font-family: 'Courier New', Courier, monospace; }
        
        /* Tactical Overlay */
        #header {
            position: absolute; top: 0; left: 0; width: 100%; height: 45px;
            background: rgba(0, 0, 0, 0.9); border-bottom: 2px solid var(--neon-green);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; box-sizing: border-box; z-index: 1000;
        }
        .status-text { color: var(--neon-green); font-size: 14px; text-transform: uppercase; }

        /* Layered Visualization */
        #map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.3; }
        #three-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }

        #ui-controls {
            position: absolute; bottom: 30px; left: 20px; z-index: 1001;
            background: rgba(0, 0, 0, 0.85); padding: 20px; border-left: 4px solid var(--neon-green);
        }
        #terminal-log { color: var(--neon-green); font-size: 12px; margin-bottom: 15px; }
        
        .btn-group { display: flex; gap: 10px; }
        .btn {
            background: transparent; border: 1px solid var(--neon-green);
            color: var(--neon-green); padding: 10px 15px; cursor: pointer;
            text-transform: uppercase; font-size: 11px; transition: 0.2s;
        }
        .btn:hover { background: var(--neon-green); color: black; box-shadow: 0 0 10px var(--neon-green); }
        .btn.active { background: var(--neon-green); color: black; box-shadow: 0 0 15px var(--neon-green); }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div id="header">
    <div class="status-text">SYSTEM: <span id="sys-status">READY</span></div>
    <div class="status-text">NODES: <span id="node-count">0</span></div>
</div>

<div id="map"></div>
<canvas id="three-canvas"></canvas>

<div id="ui-controls">
    <div id="terminal-log">> INITIALIZING SENSORS...</div>
    <div class="btn-group">
        <button id="start-btn" class="btn">START SCAN</button>
        <button id="stop-btn" class="btn">STOP</button>
        <label class="btn">IMPORT CSV <input type="file" id="csv-input" multiple></label>
        <button id="reset-btn" class="btn">RESET</button>
    </div>
</div>

<script>
    let scene, camera, renderer, map;
    let threePoints = [], mapPoints = [];
    let polyline3D, polyline2D;
    let isScanning = false, scanInterval;

    // Center on your Naples/South Florida area
    const HOME_COORDS = [26.14, -81.79]; 

    function init() {
        // 1. Initialize Leaflet Map (2D Layer)
        map = L.map('map', { zoomControl: false, attributionControl: false }).setView(HOME_COORDS, 11);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        polyline2D = L.polyline([], {color: '#00ff41', weight: 2, opacity: 0.5}).addTo(map);

        // 2. Initialize Three.js (3D Layer)
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 10, 20);

        renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('three-canvas'), antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);

        const grid = new THREE.GridHelper(50, 50, 0x222222, 0x111111);
        scene.add(grid);

        // UI Event Listeners
        document.getElementById('start-btn').onclick = startDataStream;
        document.getElementById('stop-btn').onclick = stopDataStream;
        document.getElementById('reset-btn').onclick = resetHub;
        document.getElementById('csv-input').onchange = handleCSV;

        animate();
    }

    function startDataStream() {
        if (isScanning) return;
        isScanning = true;
        document.getElementById('start-btn').classList.add('active');
        document.getElementById('sys-status').innerText = "ACTIVE";
        document.getElementById('terminal-log').innerText = "> SCANNER ACTIVE: COLLECTING DATA...";

        // Simulate real-time data collection every 1 second
        scanInterval = setInterval(() => {
            const lat = HOME_COORDS[0] + (Math.random() - 0.5) * 0.1;
            const lng = HOME_COORDS[1] + (Math.random() - 0.5) * 0.1;
            const alt = Math.random() * 5;
            processNewNode(lat, lng, alt);
        }, 1000);
    }

    function stopDataStream() {
        isScanning = false;
        clearInterval(scanInterval);
        document.getElementById('start-btn').classList.remove('active');
        document.getElementById('sys-status').innerText = "PAUSED";
        document.getElementById('terminal-log').innerText = "> SCANNER HALTED.";
    }

    function processNewNode(lat, lng, alt) {
        // Map Update (2D)
        mapPoints.push([lat, lng]);
        polyline2D.setLatLngs(mapPoints);
        L.circleMarker([lat, lng], { radius: 3, color: '#00ff41' }).addTo(map);

        // Three.js Update (3D Visualization)
        // Convert lat/lng offset to local grid units
        const x = (lng - HOME_COORDS[1]) * 100;
        const z = (lat - HOME_COORDS[0]) * 100;
        const vec = new THREE.Vector3(x, alt, z);
        
        const geo = new THREE.SphereGeometry(0.15, 8, 8);
        const mat = new THREE.MeshBasicMaterial({ color: 0x00ff41 });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.copy(vec);
        scene.add(mesh);

        threePoints.push(vec);
        update3DPolyline();
        
        document.getElementById('node-count').innerText = threePoints.length;
    }

    function update3DPolyline() {
        if (threePoints.length < 2) return;
        if (polyline3D) scene.remove(polyline3D);
        
        const geometry = new THREE.BufferGeometry().setFromPoints(threePoints);
        polyline3D = new THREE.Line(geometry, new THREE.LineBasicMaterial({ color: 0x00ff41, opacity: 0.5, transparent: true }));
        scene.add(polyline3D);
    }

    async function handleCSV(e) {
        const files = Array.from(e.target.files);
        document.getElementById('terminal-log').innerText = `> IMPORTING ${files.length} BATCH FILES...`;
        for (let file of files) {
            const text = await file.text();
            text.split('\n').forEach(line => {
                const p = line.split(',').map(Number);
                if (p.length >= 3 && !p.some(isNaN)) processNewNode(p[0], p[1], p[2]);
            });
        }
    }

    function resetHub() {
        stopDataStream();
        threePoints = [];
        mapPoints = [];
        location.reload(); // Quickest way to flush both Leaflet and Three.js buffers
    }

    function animate() {
        requestAnimationFrame(animate);
        if (isScanning) scene.rotation.y += 0.001; // Orbital view
        renderer.render(scene, camera);
    }

    window.onresize = () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    };

    init();
</script>
</body>
</html>
