<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentry Node - 3D Terrain Hub</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --neon: #00ff41; --bg: #050505; }
        body, html { margin: 0; padding: 0; overflow: hidden; background: var(--bg); font-family: 'Courier New', monospace; height: 100%; }
        
        #header {
            position: absolute; top: 0; left: 0; width: 100%; height: 40px;
            background: rgba(0,0,0,0.9); border-bottom: 2px solid var(--neon);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; box-sizing: border-box; z-index: 3000;
        }
        .stat { color: var(--neon); font-size: 13px; text-transform: uppercase; }

        #container { display: flex; flex-direction: column; height: 100vh; }
        #map-view { flex: 1; border-bottom: 1px solid #222; opacity: 0.6; }
        #three-view { flex: 1.2; position: relative; background: #000; }

        #ui {
            position: absolute; bottom: 20px; left: 20px; z-index: 4000;
            background: rgba(0,0,0,0.85); padding: 15px; border-left: 3px solid var(--neon);
        }
        #log { color: var(--neon); font-size: 11px; margin-bottom: 10px; }
        .btns { display: flex; gap: 8px; }
        .btn {
            background: transparent; border: 1px solid var(--neon);
            color: var(--neon); padding: 8px 12px; cursor: pointer;
            text-transform: uppercase; font-size: 10px;
        }
        .btn:hover { background: var(--neon); color: black; }
        .active { background: #ff3e3e !important; color: white !important; }
    </style>
</head>
<body>

<div id="header">
    <div class="stat">SYS_STATE: <span id="sys-status">STANDBY</span></div>
    <div class="stat">DATA_NODES: <span id="node-count">0</span></div>
</div>

<div id="container">
    <div id="map-view"></div>
    <div id="three-view">
        <canvas id="three-canvas"></canvas>
    </div>
</div>

<div id="ui">
    <div id="log">> READY_</div>
    <div class="btns">
        <button id="start-btn" class="btn">ACQUIRE GPS</button>
        <button id="stop-btn" class="btn">STOP & EXPORT</button>
        <button id="reset-btn" class="btn">RESET</button>
    </div>
</div>

<script>
    let scene, camera, renderer, map;
    let dataBuffer = [], threeNodes = [], polyline3D, polyline2D;
    let watchID = null, origin = null;
    let mapPlane;

    function init() {
        // 1. Setup 2D Map (Top View)
        map = L.map('map-view', { zoomControl: false, attributionControl: false }).setView([0,0], 2);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        polyline2D = L.polyline([], {color: '#00ff41', weight: 1.5}).addTo(map);

        // 2. Setup 3D Hub (Bottom View)
        const canvas = document.getElementById('three-canvas');
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(60, canvas.clientWidth / canvas.clientHeight, 0.1, 10000);
        camera.position.set(0, 150, 200);
        camera.lookAt(0,0,0);

        renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setSize(canvas.clientWidth, canvas.clientHeight);

        const grid = new THREE.GridHelper(2000, 50, 0x00ff41, 0x111111);
        grid.position.y = -1;
        scene.add(grid);

        document.getElementById('start-btn').onclick = startCapture;
        document.getElementById('stop-btn').onclick = stopAndSave;
        document.getElementById('reset-btn').onclick = () => location.reload();

        renderLoop();
    }

    function create3DMapFloor(lat, lng) {
        // Fetch a static map tile for the 3D floor texture
        const zoom = 15;
        const mapUrl = `https://api.mapbox.com/styles/v1/mapbox/dark-v10/static/${lng},${lat},${zoom},0/512x512?access_token=YOUR_MAPBOX_TOKEN_HERE`;
        
        // Note: Using a placeholder dark texture if no token is provided
        const loader = new THREE.TextureLoader();
        loader.load('https://{s}.basemaps.cartocdn.com/dark_all/15/1/1.png', (texture) => {
            const geometry = new THREE.PlaneGeometry(500, 500);
            const material = new THREE.MeshBasicMaterial({ map: texture, side: THREE.DoubleSide, transparent: true, opacity: 0.4 });
            mapPlane = new THREE.Mesh(geometry, material);
            mapPlane.rotation.x = -Math.PI / 2;
            mapPlane.position.y = -0.5;
            scene.add(mapPlane);
        });
    }

    function startCapture() {
        if (!navigator.geolocation) return;
        document.getElementById('start-btn').classList.add('active');
        document.getElementById('sys-status').innerText = "ACTIVE";
        
        watchID = navigator.geolocation.watchPosition((p) => {
            pushNode(p.coords.latitude, p.coords.longitude, p.coords.altitude || 0);
        }, null, { enableHighAccuracy: true });
    }

    function pushNode(lat, lng, alt) {
        if (!origin) {
            origin = { lat, lng };
            map.setView([lat, lng], 17);
            create3DMapFloor(lat, lng);
            document.getElementById('log').innerText = `> LOCK: ${lat.toFixed(4)}, ${lng.toFixed(4)}`;
        }

        dataBuffer.push({ time: new Date().toISOString(), lat, lng, alt });
        polyline2D.addLatLng([lat, lng]);

        // Calculate 3D offset from origin in meters
        const x = (lng - origin.lng) * 111320 * Math.cos(lat * Math.PI / 180);
        const z = (origin.lat - lat) * 111320;
        const vec = new THREE.Vector3(x, alt, z);
        threeNodes.push(vec);

        // 3D Visualizer Node
        const node = new THREE.Mesh(new THREE.SphereGeometry(2, 8, 8), new THREE.MeshBasicMaterial({ color: 0x00ff41 }));
        node.position.copy(vec);
        scene.add(node);

        draw3DLine();
        document.getElementById('node-count').innerText = dataBuffer.length;
    }

    function draw3DLine() {
        if (threeNodes.length < 2) return;
        if (polyline3D) scene.remove(polyline3D);
        const geo = new THREE.BufferGeometry().setFromPoints(threeNodes);
        polyline3D = new THREE.Line(geo, new THREE.LineBasicMaterial({ color: 0x00ff41 }));
        scene.add(polyline3D);
        camera.lookAt(threeNodes[threeNodes.length-1]);
    }

    function stopAndSave() {
        if (watchID) navigator.geolocation.clearWatch(watchID);
        let csv = "Timestamp,Lat,Lng,Alt\n" + dataBuffer.map(d => `${d.time},${d.lat},${d.lng},${d.alt}`).join("\n");
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `SENTRY_DATA.csv`; a.click();
    }

    function renderLoop() {
        requestAnimationFrame(renderLoop);
        renderer.render(scene, camera);
    }

    init();
</script>
</body>
</html>
