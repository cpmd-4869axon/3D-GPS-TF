<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentry Node - 3D Structural Scanner</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --neon: #00ff41; --bg: #050505; --alert: #ff3e3e; }
        body, html { margin: 0; padding: 0; overflow: hidden; background: var(--bg); font-family: 'Courier New', monospace; height: 100%; }
        
        #header {
            position: absolute; top: 0; left: 0; width: 100%; height: 40px;
            background: rgba(0,0,0,0.95); border-bottom: 2px solid var(--neon);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; box-sizing: border-box; z-index: 3000;
        }
        .stat { color: var(--neon); font-size: 13px; text-transform: uppercase; font-weight: bold; }

        #container { display: flex; flex-direction: column; height: 100vh; width: 100vw; }
        #map-view { flex: 0.8; position: relative; border-bottom: 1px solid var(--neon); z-index: 1; opacity: 0.3; filter: grayscale(100%) invert(100%); }
        #three-view { flex: 1.2; position: relative; background: #000; z-index: 2; }
        #three-canvas { width: 100%; height: 100%; display: block; }

        #ui {
            position: absolute; bottom: 20px; left: 20px; z-index: 4000;
            background: rgba(0,0,0,0.9); padding: 15px; border-left: 4px solid var(--neon);
        }
        #log { color: var(--neon); font-size: 12px; margin-bottom: 12px; font-weight: bold; }
        .btns { display: flex; gap: 8px; }
        .btn {
            background: transparent; border: 1px solid var(--neon);
            color: var(--neon); padding: 10px 14px; cursor: pointer;
            text-transform: uppercase; font-size: 10px; font-weight: 900;
        }
        .btn:hover { background: var(--neon); color: black; }
        .active { background: var(--alert); color: white; border-color: var(--alert); box-shadow: 0 0 15px var(--alert); }
    </style>
</head>
<body>

<div id="header">
    <div class="stat">SCANNER: <span id="sys-status">OFFLINE</span></div>
    <div class="stat">STRUCTURAL_NODES: <span id="node-count">0</span></div>
</div>

<div id="container">
    <div id="map-view"></div>
    <div id="three-view"><canvas id="three-canvas"></canvas></div>
</div>

<div id="ui">
    <div id="log">> STANDBY_</div>
    <div class="btns">
        <button id="start-btn" class="btn">START SCAN</button>
        <button id="stop-btn" class="btn">STOP & EXPORT</button>
        <button id="reset-btn" class="btn">RESET</button>
    </div>
</div>

<script>
    let scene, camera, renderer, map;
    let pointCloud, pointsGeometry, pointsMaterial;
    let allPoints = [], dataBuffer = [];
    let watchID = null, origin = null;

    function init() {
        // Map Setup
        map = L.map('map-view', { zoomControl: false, attributionControl: false }).setView([0,0], 2);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        // Three.js Setup
        const canvas = document.getElementById('three-canvas');
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(60, canvas.clientWidth / canvas.clientHeight, 0.1, 5000);
        camera.position.set(50, 50, 50);

        renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setSize(canvas.clientWidth, canvas.clientHeight);

        // Structural Grid
        const grid = new THREE.GridHelper(500, 50, 0x00ff41, 0x111111);
        grid.material.opacity = 0.1;
        grid.material.transparent = true;
        scene.add(grid);

        // Point Cloud Setup
        pointsGeometry = new THREE.BufferGeometry();
        pointsMaterial = new THREE.PointsMaterial({ color: 0x00ff41, size: 0.5 });
        pointCloud = new THREE.Points(pointsGeometry, pointsMaterial);
        scene.add(pointCloud);

        // UI
        document.getElementById('start-btn').onclick = startScan;
        document.getElementById('stop-btn').onclick = stopAndExport;
        document.getElementById('reset-btn').onclick = () => location.reload();

        animate();
    }

    function startScan() {
        if (!navigator.geolocation) return;
        document.getElementById('start-btn').classList.add('active');
        document.getElementById('sys-status').innerText = "SCANNING";
        
        // High-accuracy tracking
        watchID = navigator.geolocation.watchPosition((p) => {
            const lat = p.coords.latitude;
            const lng = p.coords.longitude;
            const alt = p.coords.altitude || 0;
            
            if (!origin) {
                origin = { lat, lng };
                map.setView([lat, lng], 19);
                updateLog(`> ORIGIN_LOCKED: ${lat.toFixed(5)}`);
            }

            // Convert to local 3D coordinates (meters)
            const x = (lng - origin.lng) * 111320 * Math.cos(lat * Math.PI / 180);
            const z = (origin.lat - lat) * 111320;
            const y = alt; // Building height

            addNode(x, y, z, lat, lng, alt);
        }, null, { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 });
    }

    function addNode(x, y, z, lat, lng, alt) {
        allPoints.push(new THREE.Vector3(x, y, z));
        dataBuffer.push({ time: new Date().toISOString(), lat, lng, alt, x, y, z });
        
        // Update 3D Point Cloud
        pointsGeometry.setFromPoints(allPoints);
        document.getElementById('node-count').innerText = allPoints.length;
        
        // Update 2D Map
        L.circleMarker([lat, lng], { radius: 2, color: '#00ff41' }).addTo(map);

        // Camera follow
        camera.lookAt(x, y, z);
    }

    function stopAndExport() {
        if (watchID) navigator.geolocation.clearWatch(watchID);
        document.getElementById('start-btn').classList.remove('active');
        document.getElementById('sys-status').innerText = "PAUSED";
        
        if (dataBuffer.length === 0) return;
        let csv = "Timestamp,Lat,Lng,Alt,Local_X,Local_Y,Local_Z\n" + 
                  dataBuffer.map(d => `${d.time},${d.lat},${d.lng},${d.alt},${d.x},${d.y},${d.z}`).join("\n");
        
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `BUILDING_SCAN_${Date.now()}.csv`;
        a.click();
    }

    function updateLog(m) { document.getElementById('log').innerText = m; }

    function animate() {
        requestAnimationFrame(animate);
        renderer.render(scene, camera);
    }

    window.onresize = () => {
        const canvas = document.getElementById('three-canvas');
        camera.aspect = canvas.clientWidth / canvas.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(canvas.clientWidth, canvas.clientHeight);
    };

    init();
</script>
</body>
</html>
