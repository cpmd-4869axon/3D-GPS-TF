<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentry Node - Tactical Interface</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.15.0/dist/tf.min.js"></script>
    <style>
        :root { --neon-green: #00ff41; --dark-bg: #0a0a0a; --dim-green: rgba(0, 255, 65, 0.2); }
        body { margin: 0; overflow: hidden; background: var(--dark-bg); font-family: 'Courier New', Courier, monospace; }
        
        /* Tactical Header Bar */
        #header {
            position: absolute; top: 0; left: 0; width: 100%; height: 45px;
            background: rgba(0, 0, 0, 0.95); border-bottom: 2px solid var(--neon-green);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; box-sizing: border-box; z-index: 100;
        }
        .status-text { color: var(--neon-green); font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Command Center UI */
        #ui-controls {
            position: absolute; bottom: 30px; left: 20px; z-index: 100;
            background: rgba(0, 0, 0, 0.85); padding: 20px; 
            border-left: 4px solid var(--neon-green);
            backdrop-filter: blur(4px);
        }
        #terminal-log { color: var(--neon-green); font-size: 12px; margin-bottom: 15px; min-height: 1.2em; }
        
        .button-group { display: flex; gap: 10px; flex-wrap: wrap; }

        /* Tactical Button Styling */
        .btn {
            background: transparent; border: 1px solid var(--neon-green);
            color: var(--neon-green); padding: 10px 18px; cursor: pointer;
            text-transform: uppercase; font-weight: bold; font-size: 12px;
            transition: all 0.2s ease;
        }
        .btn:hover { background: var(--dim-green); box-shadow: 0 0 10px var(--neon-green); }
        .btn:active { background: var(--neon-green); color: black; }
        .btn.active { background: var(--neon-green); color: black; }
        
        #csv-input { display: none; }
    </style>
</head>
<body>

<div id="header">
    <div class="status-text">SYSTEM: <span id="sys-status">OFFLINE</span></div>
    <div class="status-text">NODES: <span id="record-count">0</span></div>
</div>

<div id="ui-controls">
    <div id="terminal-log">> STANDBY_</div>
    <div class="button-group">
        <button id="start-btn" class="btn">START SCAN</button>
        <button id="stop-btn" class="btn">STOP</button>
        <label class="btn">
            IMPORT CSV
            <input type="file" id="csv-input" accept=".csv" multiple>
        </label>
    </div>
</div>

<script>
    let scene, camera, renderer, points = [], line;
    let isScanning = false;
    const log = document.getElementById('terminal-log');
    const statusDisplay = document.getElementById('sys-status');
    const recordCounter = document.getElementById('record-count');

    function init() {
        scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x0a0a0a, 0.08);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(8, 10, 20);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const grid = new THREE.GridHelper(50, 50, 0x111111, 0x222222);
        scene.add(grid);

        // Control Listeners
        document.getElementById('start-btn').addEventListener('click', startScan);
        document.getElementById('stop-btn').addEventListener('click', stopScan);
        document.getElementById('csv-input').addEventListener('change', handleFiles);
        
        animate();
    }

    function startScan() {
        isScanning = true;
        statusDisplay.innerText = "ACTIVE";
        statusDisplay.style.color = "#00ff41";
        log.innerText = "> SCANNER INITIALIZED. RECEIVING DATA...";
        document.getElementById('start-btn').classList.add('active');
        document.getElementById('stop-btn').classList.remove('active');
    }

    function stopScan() {
        isScanning = false;
        statusDisplay.innerText = "PAUSED";
        statusDisplay.style.color = "#ff3e3e";
        log.innerText = "> SCANNER HALTED.";
        document.getElementById('stop-btn').classList.add('active');
        document.getElementById('start-btn').classList.remove('active');
    }

    async function handleFiles(event) {
        const files = Array.from(event.target.files);
        log.innerText = `> TENSORFLOW.JS: PROCESSING ${files.length} FILES...`;

        for (const file of files) {
            const text = await file.text();
            const data = parseCSV(text);
            
            if (data.length > 0) {
                // TF.js data pipeline
                const tensor = tf.tensor2d(data, [data.length, 3]);
                const coords = await tensor.array();
                
                coords.forEach(c => addDataPoint(new THREE.Vector3(c[0], c[1], c[2])));
                tensor.dispose();
            }
        }
        log.innerText = `> BATCH IMPORT COMPLETE.`;
    }

    function parseCSV(text) {
        return text.split('\n')
            .map(row => row.split(',').map(Number))
            .filter(row => row.length === 3 && !row.some(isNaN));
    }

    function addDataPoint(vec) {
        if (!isScanning) return; // Only render if scanner is active
        
        const geo = new THREE.SphereGeometry(0.1, 8, 8);
        const mat = new THREE.MeshPhongMaterial({ color: 0x00ff41, emissive: 0x002200 });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.copy(vec);
        scene.add(mesh);
        
        points.push(vec);
        recordCounter.innerText = points.length;
        updateLine();
    }

    function updateLine() {
        if (points.length < 2) return;
        if (line) scene.remove(line);
        const geometry = new THREE.BufferGeometry().setFromPoints(points);
        line = new THREE.Line(geometry, new THREE.LineBasicMaterial({ color: 0x00ff41, opacity: 0.4, transparent: true }));
        scene.add(line);
    }

    function animate() {
        requestAnimationFrame(animate);
        if (isScanning) {
            scene.rotation.y += 0.0015;
        }
        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    init();
</script>
</body>
</html>
