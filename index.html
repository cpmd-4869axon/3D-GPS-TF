<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SENTRY_NODE_v6</title>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <style>
        :root { --neon: #00ff41; --bg: #000; --alert: #ff3e3e; }
        body, html { margin: 0; padding: 0; overflow: hidden; background: var(--bg); font-family: 'Courier New', monospace; color: var(--neon); height: 100%; width: 100%; }
        #viewport { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #interface { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.85); border-top: 1px solid var(--neon); padding: 20px; box-sizing: border-box; z-index: 1000; backdrop-filter: blur(5px); }
        #stats { position: absolute; top: 0; width: 100%; height: 40px; background: #000; border-bottom: 1px solid var(--neon); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; box-sizing: border-box; z-index: 1000; font-weight: bold; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 15px 5px; text-align: center; font-size: 12px; text-transform: uppercase; cursor: pointer; border-radius: 4px; display: flex; align-items: center; justify-content: center; }
        .btn:active { background: var(--neon); color: #000; }
        .rec { border-color: var(--alert); color: var(--alert); box-shadow: 0 0 15px var(--alert); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        #legend { position: absolute; top: 60px; right: 20px; background: rgba(0,0,0,0.9); border: 1px solid var(--neon); padding: 10px; font-size: 11px; z-index: 1000; display: none; max-height: 200px; overflow-y: auto; }
    </style>
</head>
<body>

<div id="stats">
    <div>SYS_MODE: <span id="mode">STANDBY</span></div>
    <div>NODES: <span id="count">0</span></div>
</div>

<div id="legend"><b>DATA_KEYS</b><hr style="border:0.5px solid var(--neon);"><div id="legend-list"></div></div>
<div id="viewport"></div>

<div id="interface">
    <div id="log" style="font-size:10px; margin-bottom:10px; height: 15px; overflow: hidden;">> SYSTEM_READY_</div>
    <div class="btn-grid">
        <div id="start" class="btn">ACQUIRE GPS</div>
        <div id="stop" class="btn">STOP & PLOT</div>
        <label class="btn">IMPORT <input type="file" id="file-in" multiple style="display:none;"></label>
        <div id="save" class="btn">SAVE DATA</div>
    </div>
</div>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let scene, camera, renderer, controls, origin = null;
    let sessionLog = [], currentTrace = [];
    let watchID = null;
    const palette = ['#00ff41', '#00f2ff', '#ff00ea', '#fff200', '#ff3e3e', '#ffffff'];

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 50000);
        camera.position.set(100, 100, 100);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('viewport').appendChild(renderer.domElement);

        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        const grid = new THREE.GridHelper(5000, 100, 0x00ff41, 0x222222);
        scene.add(grid);

        // Resize handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        document.getElementById('start').onclick = () => {
            if (watchID) return;
            currentTrace = [];
            document.getElementById('start').classList.add('rec');
            document.getElementById('mode').innerText = "RECORDING";
            document.getElementById('log').innerText = "> GEOLOCATION_ACTIVE...";

            watchID = navigator.geolocation.watchPosition(p => {
                const node = { 
                    t: Date.now(), 
                    lat: p.coords.latitude, 
                    lng: p.coords.longitude, 
                    alt: p.coords.altitude || 0, 
                    id: "LIVE" 
                };
                currentTrace.push(node);
                document.getElementById('count').innerText = currentTrace.length;
            }, (err) => {
                console.error(err);
                document.getElementById('log').innerText = "> ERR: GPS_SIGNAL_LOST";
            }, { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 });
        };

        document.getElementById('stop').onclick = () => {
            if (!watchID) return;
            navigator.geolocation.clearWatch(watchID);
            watchID = null;
            document.getElementById('start').classList.remove('rec');
            document.getElementById('mode').innerText = "PLOTTED";
            document.getElementById('log').innerText = "> TRACE_COMMITTED";
            
            if (currentTrace.length > 0) {
                renderTrace(currentTrace, palette[0], "LIVE_SCAN");
                sessionLog = sessionLog.concat(currentTrace);
            }
        };

        document.getElementById('file-in').onchange = async (e) => {
            const files = Array.from(e.target.files);
            for (let i = 0; i < files.length; i++) {
                const text = await files[i].text();
                const color = palette[(i + 1) % palette.length];
                const rows = text.split('\n').filter(r => r.trim() !== '').slice(1);
                
                const data = rows.map(r => {
                    const c = r.split(',');
                    return { 
                        t: c[0],
                        lat: parseFloat(c[1]), 
                        lng: parseFloat(c[2]), 
                        alt: parseFloat(c[3] || 0), 
                        id: files[i].name 
                    };
                }).filter(d => !isNaN(d.lat) && !isNaN(d.lng));

                if (data.length > 0) {
                    renderTrace(data, color, files[i].name);
                    sessionLog = sessionLog.concat(data);
                }
            }
        };

        document.getElementById('save').onclick = () => {
            if (sessionLog.length === 0) {
                alert("No data to save.");
                return;
            }
            const csv = "Time,Lat,Lng,Alt,ID\n" + sessionLog.map(d => `${d.t},${d.lat},${d.lng},${d.alt},${d.id}`).join("\n");
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `SENTRY_${Date.now()}.csv`;
            a.click();
            setTimeout(() => URL.revokeObjectURL(url), 100);
        };

        animate();
    }

    function renderTrace(data, color, label) {
        if (!origin && data.length > 0) {
            origin = { lat: data[0].lat, lng: data[0].lng };
            document.getElementById('log').innerText = `> ORIGIN_SET: ${origin.lat.toFixed(4)},${origin.lng.toFixed(4)}`;
        }

        const group = new THREE.Group();
        const mat = new THREE.MeshBasicMaterial({ color: color });
        const geo = new THREE.SphereGeometry(0.8, 6, 6);

        data.forEach(d => {
            // Simple Mercator-ish projection for local visualization
            const x = (d.lng - origin.lng) * 111320 * Math.cos(origin.lat * Math.PI / 180);
            const z = (origin.lat - d.lat) * 111320;
            const m = new THREE.Mesh(geo, mat);
            m.position.set(x, d.alt, z);
            group.add(m);
        });

        scene.add(group);
        
        // Update UI
        document.getElementById('legend').style.display = 'block';
        const item = document.createElement('div');
        item.style.marginBottom = "4px";
        item.innerHTML = `<span style="color:${color}">■</span> ${label} (${data.length})`;
        document.getElementById('legend-list').appendChild(item);
    }

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }

    init();
</script>
</body>
</html>
