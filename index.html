<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentry Node - Real-Time GPS Hub</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --neon-green: #00ff41; --dark-bg: #0a0a0a; }
        body { margin: 0; overflow: hidden; background: var(--dark-bg); font-family: 'Courier New', Courier, monospace; }
        
        #header {
            position: absolute; top: 0; left: 0; width: 100%; height: 45px;
            background: rgba(0, 0, 0, 0.9); border-bottom: 2px solid var(--neon-green);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; box-sizing: border-box; z-index: 1000;
        }
        .status-text { color: var(--neon-green); font-size: 14px; text-transform: uppercase; }

        #map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.4; }
        #three-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }

        #ui-controls {
            position: absolute; bottom: 30px; left: 20px; z-index: 1001;
            background: rgba(0, 0, 0, 0.85); padding: 20px; border-left: 4px solid var(--neon-green);
        }
        #terminal-log { color: var(--neon-green); font-size: 12px; margin-bottom: 15px; max-width: 300px; }
        
        .btn-group { display: flex; gap: 10px; }
        .btn {
            background: transparent; border: 1px solid var(--neon-green);
            color: var(--neon-green); padding: 10px 15px; cursor: pointer;
            text-transform: uppercase; font-size: 11px;
        }
        .btn:hover { background: var(--neon-green); color: black; }
        .btn.active { background: #ff3e3e; color: white; border-color: #ff3e3e; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div id="header">
    <div class="status-text">SYSTEM: <span id="sys-status">OFFLINE</span></div>
    <div class="status-text">NODES: <span id="node-count">0</span></div>
</div>

<div id="map"></div>
<canvas id="three-canvas"></canvas>

<div id="ui-controls">
    <div id="terminal-log">> AWAITING SIGNAL...</div>
    <div class="btn-group">
        <button id="start-btn" class="btn">ACQUIRE GPS</button>
        <button id="stop-btn" class="btn">STOP</button>
        <label class="btn">IMPORT CSV <input type="file" id="csv-input" multiple></label>
        <button id="reset-btn" class="btn">RESET</button>
    </div>
</div>

<script>
    let scene, camera, renderer, map;
    let threePoints = [], mapPoints = [];
    let polyline3D, polyline2D;
    let watchID = null;
    let firstPointAcquired = false;
    let origin = { lat: 0, lng: 0 };

    function init() {
        // Init Map with a global view, no center yet
        map = L.map('map', { zoomControl: false, attributionControl: false }).setView([0, 0], 2);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        polyline2D = L.polyline([], {color: '#00ff41', weight: 2}).addTo(map);

        // Init Three.js
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 10, 20);
        renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('three-canvas'), antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        scene.add(new THREE.GridHelper(100, 100, 0x222222, 0x111111));

        document.getElementById('start-btn').onclick = toggleGPS;
        document.getElementById('stop-btn').onclick = stopGPS;
        document.getElementById('csv-input').onchange = handleCSV;
        document.getElementById('reset-btn').onclick = () => location.reload();

        animate();
    }

    function toggleGPS() {
        if (!navigator.geolocation) {
            updateLog("ERROR: GEOLOCATION NOT SUPPORTED");
            return;
        }

        updateLog("> REQUESTING SENSOR PERMISSION...");
        document.getElementById('start-btn').classList.add('active');
        document.getElementById('sys-status').innerText = "LINKING...";

        watchID = navigator.geolocation.watchPosition(
            (pos) => {
                const { latitude, longitude, altitude } = pos.coords;
                processDataNode(latitude, longitude, altitude || 0);
            },
            (err) => updateLog(`ERROR: ${err.message}`),
            { enableHighAccuracy: true, maximumAge: 0 }
        );
    }

    function stopGPS() {
        if (watchID) navigator.geolocation.clearWatch(watchID);
        document.getElementById('start-btn').classList.remove('active');
        document.getElementById('sys-status').innerText = "PAUSED";
        updateLog("> SENSOR LINK DISCONNECTED.");
    }

    function processDataNode(lat, lng, alt) {
        // Set origin based on the very first point received
        if (!firstPointAcquired) {
            origin = { lat, lng };
            map.setView([lat, lng], 16);
            updateLog(`> LOCK ACQUIRED: ${lat.toFixed(4)}, ${lng.toFixed(4)}`);
            document.getElementById('sys-status').innerText = "ACTIVE";
            firstPointAcquired = true;
        }

        // 2D Map Update
        mapPoints.push([lat, lng]);
        polyline2D.setLatLngs(mapPoints);
        L.circleMarker([lat, lng], { radius: 4, color: '#00ff41', fillOpacity: 1 }).addTo(map);

        // 3D Visualization Update
        // Convert Lat/Lng to local meters relative to origin
        const x = (lng - origin.lng) * 111320 * Math.cos(lat * Math.PI / 180);
        const z = (origin.lat - lat) * 111320;
        const vec = new THREE.Vector3(x / 10, alt, z / 10); // Scaled for visibility
        
        const mesh = new THREE.Mesh(
            new THREE.SphereGeometry(0.3, 8, 8),
            new THREE.MeshBasicMaterial({ color: 0x00ff41 })
        );
        mesh.position.copy(vec);
        scene.add(mesh);
        threePoints.push(vec);

        update3DPolyline();
        document.getElementById('node-count').innerText = threePoints.length;
    }

    function update3DPolyline() {
        if (threePoints.length < 2) return;
        if (polyline3D) scene.remove(polyline3D);
        const geo = new THREE.BufferGeometry().setFromPoints(threePoints);
        polyline3D = new THREE.Line(geo, new THREE.LineBasicMaterial({ color: 0x00ff41 }));
        scene.add(polyline3D);
    }

    async function handleCSV(e) {
        const files = Array.from(e.target.files);
        updateLog(`> PARSING ${files.length} CSV BATCH...`);
        for (let file of files) {
            const text = await file.text();
            text.split('\n').forEach(line => {
                const p = line.split(',').map(Number);
                if (p.length >= 2 && !p.some(isNaN)) {
                    processDataNode(p[0], p[1], p[2] || 0);
                }
            });
        }
    }

    function updateLog(msg) {
        document.getElementById('terminal-log').innerText = msg;
    }

    function animate() {
        requestAnimationFrame(animate);
        renderer.render(scene, camera);
    }

    window.onresize = () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    };

    init();
</script>
</body>
</html>
