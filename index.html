<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SENTRY_NODE_v7</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <style>
        :root { --neon: #00ff41; --bg: #000; --alert: #ff3e3e; }
        body, html { margin: 0; padding: 0; overflow: hidden; background: var(--bg); font-family: 'Courier New', monospace; color: var(--neon); height: 100%; width: 100%; }
        
        /* Layering: Map at bottom, 3D in middle, UI on top */
        #map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.4; pointer-events: none; filter: grayscale(1) invert(1) brightness(0.5); display: none;}
        #viewport { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; background: transparent; }
        
        #interface { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.85); border-top: 1px solid var(--neon); padding: 20px; box-sizing: border-box; z-index: 1000; backdrop-filter: blur(5px); }
        #stats { position: absolute; top: 0; width: 100%; height: 40px; background: #000; border-bottom: 1px solid var(--neon); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; box-sizing: border-box; z-index: 1000; font-weight: bold; }
        
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .btn { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 12px 2px; text-align: center; font-size: 11px; text-transform: uppercase; cursor: pointer; border-radius: 2px; }
        .btn:active, .active-btn { background: var(--neon); color: #000; }
        .rec { border-color: var(--alert); color: var(--alert); box-shadow: 0 0 10px var(--alert); }
        
        #legend { position: absolute; top: 50px; right: 10px; background: rgba(0,0,0,0.8); border: 1px solid var(--neon); padding: 8px; font-size: 10px; z-index: 1000; display: none; }
    </style>
</head>
<body>

<div id="map"></div>
<div id="viewport"></div>

<div id="stats">
    <div>MODE: <span id="mode">STBY</span></div>
    <div>NODES: <span id="count">0</span></div>
</div>

<div id="legend"><div id="legend-list"></div></div>

<div id="interface">
    <div id="log" style="font-size:9px; margin-bottom:8px; height:12px;">> SYS_READY</div>
    <div class="btn-grid">
        <div id="start" class="btn">ACQUIRE</div>
        <div id="stop" class="btn">PLOT</div>
        <div id="toggleMap" class="btn">MAP: OFF</div>
        <label class="btn">IMPORT <input type="file" id="file-in" multiple style="display:none;"></label>
        <div id="save" class="btn">SAVE</div>
        <div id="clear" class="btn" style="border-color:var(--alert)">CLEAR</div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let scene, camera, renderer, controls, origin = null, lMap = null;
    let sessionLog = [], currentTrace = [], watchID = null;
    const palette = ['#00ff41', '#00f2ff', '#ff00ea', '#fff200', '#ff3e3e'];

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 100000);
        camera.position.set(0, 200, 200);

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('viewport').appendChild(renderer.domElement);

        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        scene.add(new THREE.GridHelper(10000, 50, 0x00ff41, 0x111111));

        // Leaflet Init (Hidden until toggled)
        lMap = L.map('map', { zoomControl: false, attributionControl: false }).setView([0, 0], 18);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(lMap);

        // --- BUTTON LOGIC ---
        document.getElementById('toggleMap').onclick = (e) => {
            const m = document.getElementById('map');
            const isActive = m.style.display === 'block';
            m.style.display = isActive ? 'none' : 'block';
            e.target.innerText = isActive ? "MAP: OFF" : "MAP: ON";
            e.target.classList.toggle('active-btn');
        };

        document.getElementById('start').onclick = () => {
            if (watchID) return;
            currentTrace = [];
            document.getElementById('start').classList.add('rec');
            document.getElementById('mode').innerText = "REC";
            watchID = navigator.geolocation.watchPosition(p => {
                const node = { t: Date.now(), lat: p.coords.latitude, lng: p.coords.longitude, alt: p.coords.altitude || 0, id: "LIVE" };
                currentTrace.push(node);
                document.getElementById('count').innerText = currentTrace.length;
                if(!origin) setOrigin(node.lat, node.lng);
            }, null, { enableHighAccuracy: true });
        };

        document.getElementById('stop').onclick = () => {
            navigator.geolocation.clearWatch(watchID);
            watchID = null;
            document.getElementById('start').classList.remove('rec');
            document.getElementById('mode').innerText = "PLOT";
            if (currentTrace.length > 0) {
                renderTrace(currentTrace, palette[0], "LIVE_SCAN");
                sessionLog = sessionLog.concat(currentTrace);
                currentTrace = [];
            }
        };

        document.getElementById('clear').onclick = () => {
            location.reload(); // Hard reset for system stability
        };

        document.getElementById('save').onclick = () => {
            const csv = "Time,Lat,Lng,Alt,ID\n" + sessionLog.map(d => `${d.t},${d.lat},${d.lng},${d.alt},${d.id}`).join("\n");
            const blob = new Blob([csv], { type: 'text/csv' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `SENTRY_${Date.now()}.csv`;
            a.click();
        };

        animate();
    }

    function setOrigin(lat, lng) {
        origin = { lat, lng };
        lMap.setView([lat, lng], 18);
        document.getElementById('log').innerText = `> ORIGIN_LOCKED: ${lat.toFixed(4)}, ${lng.toFixed(4)}`;
    }

    function renderTrace(data, color, label) {
        if (!origin && data.length > 0) setOrigin(data[0].lat, data[0].lng);
        
        const points = [];
        const group = new THREE.Group();
        const mat = new THREE.MeshBasicMaterial({ color: color });
        const geo = new THREE.SphereGeometry(1, 6, 6);

        data.forEach(d => {
            const x = (d.lng - origin.lng) * 111320 * Math.cos(origin.lat * Math.PI / 180);
            const z = (origin.lat - d.lat) * 111320;
            const y = d.alt;
            
            const m = new THREE.Mesh(geo, mat);
            m.position.set(x, y, z);
            group.add(m);
            points.push(new THREE.Vector3(x, y, z));
        });

        // Add Path Line
        const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
        const lineMat = new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: 0.6 });
        const line = new THREE.Line(lineGeo, lineMat);
        group.add(line);

        scene.add(group);
        
        document.getElementById('legend').style.display = 'block';
        const item = document.createElement('div');
        item.innerHTML = `<span style="color:${color}">■</span> ${label}`;
        document.getElementById('legend-list').appendChild(item);
    }

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
        
        // Keep Leaflet map panned to match 3D center (simplified)
        if(origin && lMap) {
            // Optional: You could sync lMap.setZoom based on camera.position.y
        }
    }

    window.onload = init;
</script>
</body>
</html>
