<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SENTRY_NODE_v17</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <style>
        :root { --neon: #00ff41; --bg: #000; --hold: #ffea00; }
        body, html { margin: 0; padding: 0; overflow: hidden; background: var(--bg); font-family: 'Courier New', monospace; color: var(--neon); height: 100%; }
        
        #map-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; perspective: 1200px; z-index: 1; pointer-events: none; }
        #map { width: 100%; height: 100%; filter: invert(100%) hue-rotate(90deg) brightness(0.6) contrast(1.5); mix-blend-mode: screen; opacity: 0.8; transition: transform 0.05s linear; }

        #viewport { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; }
        #interface { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.95); border-top: 1px solid var(--neon); padding: 15px; box-sizing: border-box; z-index: 1000; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .btn { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 12px 2px; text-align: center; font-size: 10px; cursor: pointer; text-transform: uppercase; border-radius: 2px; }
        .lock-active { border-color: var(--hold) !important; color: var(--hold) !important; }
        #log { font-size: 10px; margin-bottom: 8px; color: var(--neon); height: 14px; overflow: hidden; }
    </style>
</head>
<body>

<div id="map-container"><div id="map"></div></div>
<div id="viewport"></div>

<div id="interface">
    <div id="log">> OMNI_SYNC_STABLE</div>
    <div class="btn-grid">
        <div id="start" class="btn">ACQUIRE</div>
        <div id="stop" class="btn">PLOT</div>
        <div id="hold" class="btn">POS_LOCK</div>
        <div id="recenter" class="btn" style="border-color:#fff; color:#fff;">RE-CENTER</div>
        <div id="save" class="btn" style="color: #00f2ff; border-color: #00f2ff;">SAVE</div>
        <div id="clear" class="btn" style="border-color:#ff3e3e">CLEAR</div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let scene, camera, renderer, controls, origin = null, lMap = null;
    let sessionLog = [], currentTrace = [], watchID = null;
    let isPosLocked = false; 

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 100000);
        camera.position.set(0, 800, 400);

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setClearColor(0x000000, 0);
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('viewport').appendChild(renderer.domElement);

        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        
        const grid = new THREE.GridHelper(10000, 50, 0x00ff41, 0x111111);
        grid.material.transparent = true; grid.material.opacity = 0.2;
        scene.add(grid);

        lMap = L.map('map', { 
            zoomControl: false, attributionControl: false,
            dragging: false, scrollWheelZoom: false, doubleClickZoom: false,
            zoomAnimation: false, fadeAnimation: false
        }).setView([0, 0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(lMap);

        controls.addEventListener('change', syncOmni);

        // DATA ACQUISITION
        document.getElementById('start').onclick = () => {
            if (watchID) return;
            document.getElementById('log').innerText = "> CAPTURING_GEOSPATIAL_STREAM...";
            watchID = navigator.geolocation.watchPosition(p => {
                const node = { 
                    time: new Date().toISOString(), 
                    lat: p.coords.latitude, 
                    lng: p.coords.longitude, 
                    alt: p.coords.altitude || 0 
                };
                currentTrace.push(node);
                if (!origin) {
                    origin = { lat: node.lat, lng: node.lng };
                    lMap.setView([origin.lat, origin.lng], 18);
                }
            }, (err) => {
                document.getElementById('log').innerText = "> ERR: GPS_SIGNAL_LOST";
            }, { enableHighAccuracy: true });
        };

        document.getElementById('stop').onclick = () => {
            if (!watchID) return;
            navigator.geolocation.clearWatch(watchID);
            watchID = null;
            if (currentTrace.length > 0) {
                renderTrace(currentTrace, '#00ff41');
                sessionLog = sessionLog.concat(currentTrace); // Save to global session
                currentTrace = [];
                document.getElementById('log').innerText = "> DATA_COMMITTED_TO_BUFFER";
            }
        };

        // EXPORT FIX
        document.getElementById('save').onclick = () => {
            if (sessionLog.length === 0 && currentTrace.length === 0) {
                document.getElementById('log').innerText = "> ERR: NO_DATA_TO_EXPORT";
                return;
            }
            
            // Combine any uncommitted trace data with the session log
            const finalData = sessionLog.concat(currentTrace);
            
            const csvRows = ["Timestamp,Latitude,Longitude,Altitude"];
            finalData.forEach(d => {
                csvRows.push(`${d.time},${d.lat},${d.lng},${d.alt}`);
            });

            const csvContent = csvRows.join("\n");
            const blob = new Blob([csvContent], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('hidden', '');
            a.setAttribute('href', url);
            a.setAttribute('download', `SENTRY_LOG_${Date.now()}.csv`);
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            document.getElementById('log').innerText = "> EXPORT_SUCCESSFUL";
        };

        document.getElementById('hold').onclick = (e) => {
            isPosLocked = !isPosLocked;
            controls.enablePan = !isPosLocked;
            controls.enableRotate = !isPosLocked;
            e.target.innerText = isPosLocked ? "RESUME" : "POS_LOCK";
            e.target.classList.toggle('lock-active', isPosLocked);
        };

        document.getElementById('recenter').onclick = () => {
            camera.position.set(0, 800, 400);
            controls.target.set(0, 0, 0);
            controls.update();
            if (origin) lMap.setView([origin.lat, origin.lng], 18);
            syncOmni();
        };

        document.getElementById('clear').onclick = () => location.reload();
        animate();
    }

    function syncOmni() {
        if (!origin || !lMap) return;
        const zoomLevel = 18 - Math.log2(camera.position.y / 150);
        lMap.setZoom(Math.max(2, zoomLevel), { animate: false });
        const latOffset = -controls.target.z / 111320;
        const lngOffset = controls.target.x / (111320 * Math.cos(origin.lat * Math.PI / 180));
        lMap.panTo([origin.lat + latOffset, origin.lng + lngOffset], { animate: false });

        const polarAngle = controls.getPolarAngle();
        const azimuthAngle = controls.getAzimuthalAngle();
        const mapEl = document.getElementById('map');
        mapEl.style.transform = `rotateX(${polarAngle * (180 / Math.PI)}deg) rotateZ(${-(azimuthAngle * (180 / Math.PI))}deg) scale(2.5)`;
    }

    function renderTrace(data, color) {
        const points = [];
        const leafPoints = [];
        const group = new THREE.Group();
        data.forEach(d => {
            const x = (d.lng - origin.lng) * 111320 * Math.cos(origin.lat * Math.PI / 180);
            const z = (origin.lat - d.lat) * 111320;
            points.push(new THREE.Vector3(x, d.alt, z));
            leafPoints.push([d.lat, d.lng]);
            const m = new THREE.Mesh(new THREE.SphereGeometry(2, 8, 8), new THREE.MeshBasicMaterial({ color }));
            m.position.set(x, d.alt, z);
            group.add(m);
        });
        scene.add(group);
        const line = new THREE.Line(new THREE.BufferGeometry().setFromPoints(points), new THREE.LineBasicMaterial({ color }));
        scene.add(line);
        L.polyline(leafPoints, { color: '#00ff41', weight: 2 }).addTo(lMap);
    }

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }

    window.onload = init;
</script>
</body>
</html>
