<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sentry Hub - Rebuilt</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        :root { --neon: #00ff41; --bg: #050505; --alert: #ff3e3e; }
        body, html { margin: 0; padding: 0; overflow: hidden; background: var(--bg); font-family: monospace; height: 100%; color: var(--neon); }
        
        /* 3D Canvas Background */
        #three-view { position: absolute; top: 0; left: 0; width: 100%; height: 70%; background: #000; z-index: 1; }

        /* Unified Top Header */
        #header {
            position: absolute; top: 0; left: 0; width: 100%; height: 40px;
            background: rgba(0,0,0,0.9); border-bottom: 2px solid var(--neon);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 15px; box-sizing: border-box; z-index: 100;
        }

        /* Bottom UI Panel - Forced to Top Layer */
        #ui-panel {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 30%;
            background: #000; border-top: 2px solid var(--neon);
            padding: 15px; box-sizing: border-box; z-index: 1000;
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; height: 80%; }
        
        .btn {
            background: #000; border: 1px solid var(--neon); color: var(--neon);
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: bold; text-transform: uppercase;
            cursor: pointer; -webkit-tap-highlight-color: transparent;
        }

        .btn:active { background: var(--neon); color: #000; }
        .active-scan { border-color: var(--alert); color: var(--alert); box-shadow: inset 0 0 10px var(--alert); }
        
        #log { font-size: 12px; margin-bottom: 8px; height: 15px; overflow: hidden; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div id="header">
    <div>SYS_STATE: <span id="status">READY</span></div>
    <div>NODES: <span id="count">0</span></div>
</div>

<div id="three-view"></div>

<div id="ui-panel">
    <div id="log">> SYSTEM_INITIALIZED</div>
    <div class="grid">
        <div id="gps-btn" class="btn">ACQUIRE GPS</div>
        <div id="save-btn" class="btn">EXPORT DATA</div>
        <label class="btn">IMPORT CSV <input type="file" id="csv-in" multiple></label>
        <div id="reset-btn" class="btn">RESET</div>
    </div>
</div>

<script>
    // Global Variables
    var scene, camera, renderer, controls, watchID = null, origin = null;
    var dataPoints = [];

    function start() {
        // Setup Three.js
        var container = document.getElementById('three-view');
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(60, container.clientWidth / container.clientHeight, 0.1, 10000);
        camera.position.set(50, 50, 50);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        container.appendChild(renderer.domElement);

        // Grid
        var grid = new THREE.GridHelper(1000, 50, 0x00ff41, 0x222222);
        scene.add(grid);

        // Controls
        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // Manual Event Mapping
        document.getElementById('gps-btn').onclick = toggleGPS;
        document.getElementById('save-btn').onclick = downloadCSV;
        document.getElementById('reset-btn').onclick = function() { location.reload(); };
        document.getElementById('csv-in').onchange = handleImport;

        animate();
    }

    function toggleGPS() {
        var btn = document.getElementById('gps-btn');
        if (watchID) {
            navigator.geolocation.clearWatch(watchID);
            watchID = null;
            btn.classList.remove('active-scan');
            document.getElementById('status').innerText = "PAUSED";
            updateLog("> SENSOR PAUSED");
        } else {
            btn.classList.add('active-scan');
            updateLog("> REQUESTING GPS...");
            watchID = navigator.geolocation.watchPosition(function(pos) {
                document.getElementById('status').innerText = "ACTIVE";
                addNode(pos.coords.latitude, pos.coords.longitude, pos.coords.altitude || 0);
            }, function(err) {
                updateLog("> ERR: " + err.message);
            }, { enableHighAccuracy: true });
        }
    }

    function addNode(lat, lng, alt) {
        if (!origin) origin = { lat: lat, lng: lng };
        
        // Convert to local meters
        var x = (lng - origin.lng) * 111320 * Math.cos(lat * Math.PI / 180);
        var z = (origin.lat - lat) * 111320;

        var geo = new THREE.SphereGeometry(0.8, 8, 8);
        var mat = new THREE.MeshBasicMaterial({ color: 0x00ff41 });
        var mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(x, alt, z);
        scene.add(mesh);

        dataPoints.push({ lat: lat, lng: lng, alt: alt, x: x, z: z });
        document.getElementById('count').innerText = dataPoints.length;
        updateLog("> RECV: " + lat.toFixed(5) + ", " + lng.toFixed(5));
    }

    function handleImport(e) {
        var files = e.target.files;
        updateLog("> IMPORTING " + files.length + " FILES");
        for (var i = 0; i < files.length; i++) {
            var reader = new FileReader();
            reader.onload = function(event) {
                var lines = event.target.result.split('\n');
                for (var j = 1; j < lines.length; j++) {
                    var p = lines[j].split(',');
                    if (p.length >= 3) addNode(parseFloat(p[1]), parseFloat(p[2]), parseFloat(p[3] || 0));
                }
            };
            reader.readAsText(files[i]);
        }
    }

    function downloadCSV() {
        if (dataPoints.length === 0) return updateLog("> NO DATA");
        var csv = "Time,Lat,Lng,Alt,X,Z\n";
        dataPoints.forEach(function(d) {
            csv += Date.now() + "," + d.lat + "," + d.lng + "," + d.alt + "," + d.x + "," + d.z + "\n";
        });
        var blob = new Blob([csv], { type: 'text/csv' });
        var a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "SCAN_" + Date.now() + ".csv";
        a.click();
    }

    function updateLog(m) { document.getElementById('log').innerText = m; }

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }

    // Launch
    window.onload = start;
</script>
</body>
</html>
